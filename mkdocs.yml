site_name: Sfdx-Hardis Documentation
site_url: https://sfdx-hardis.cloudity.com/
repo_url: https://github.com/hardisgroupcom/sfdx-hardis
edit_uri: tree/master/docs
site_author: Nicolas Vuillamy
site_description: Salesforce DX Plugin, by Cloudity.
copyright: Doc generated by <a href="https://sfdx-hardis.cloudity.com/hardis/doc/plugin/generate/" target="_blank">sfdx-hardis</a>
theme:
  name: material
  custom_dir: docs/overrides
  features:
    - content.code.copy
    - navigation.instant
    - navigation.footer
  logo: assets/images/cloudity-text-logo-white.svg
  favicon: assets/images/cloudity-logo.svg
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
      background: '#F3F3F3'
      foreground: '#001135'
      colors:
        primary: '#0053FF'
        accent: '#660FF2'
        link: '#0053FF'
        header: '#001135'
        nav: '#F3F3F3'
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
      background: '#121212'
      foreground: '#FFFFFF'
      colors:
        primary: '#0053FF'
        accent: '#660FF2'
        link: '#0053FF'
        header: '#121212'
        nav: '#1A1A2E'
plugins:
  - glightbox
  - search
markdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.snippets:
      base_path: docs
      check_paths: true
      restrict_base_path: false
  - mdx_truly_sane_lists
  - attr_list
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - md_in_html
extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/tablesort/5.2.1/tablesort.min.js
  - javascripts/tables.js
  - javascripts/gtag.js
extra_css:
  - stylesheets/extra.css
extra:
  social:
    - icon: fontawesome/regular/circle-question
      link: https://github.com/hardisgroupcom/sfdx-hardis/issues
      title: Need help ? Post an issue :)
    - icon: fontawesome/brands/github
      link: https://github.com/hardisgroupcom/sfdx-hardis
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/r/hardisgroupcom/sfdx-hardis/tags
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/NicolasVuillamy
  generator: false
