name: tests
on:
  push:
    branches-ignore: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  linux-unit-tests:
    uses: salesforcecli/github-workflows/.github/workflows/unitTestsLinux.yml@main # zizmor: ignore[unpinned-uses]
    permissions:
      contents: read
      checks: write
    with:
      skipTsDepCheck: true

  windows-unit-tests:
    uses: salesforcecli/github-workflows/.github/workflows/unitTestsWindows.yml@main # zizmor: ignore[unpinned-uses]
    permissions:
      contents: read
      checks: write

  nuts:
    needs:
      - linux-unit-tests
      - windows-unit-tests
    uses: salesforcecli/github-workflows/.github/workflows/nut.yml@main # zizmor: ignore[unpinned-uses]
    secrets: inherit # zizmor: ignore[secrets-inherit]
    permissions:
      contents: read
      checks: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false
    with:
      os: ${{ matrix.os }}
